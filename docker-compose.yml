services:
  backend:
    build: .
    container_name: banking-backend
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      # Keep container port aligned with server.js default.
      PORT: 5000
    volumes:
      # Live-reload: host source overrides image copy; preserve container node_modules.
      - .:/app
      - /app/node_modules
    command: npm run dev
